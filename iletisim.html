<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Teknolojileri Projesi | İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">MEHMET ZENGİNCE</a>
            <div class="collapse navbar-collapse d-flex justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkımda</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehir.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="film.html">Film Rehberi</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <header class="text-center mb-5 border-bottom pb-3">
            <h1 class="display-4 text-primary">Bana Ulaşın</h1>
            <p class="lead">Görüş, öneri ve mesajlarınız için aşağıdaki formu doldurabilirsiniz.</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <form id="iletisimFormu" class="p-4 bg-light shadow-sm rounded">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="ad" class="form-label">Adınız:</label>
                            <input type="text" class="form-control" id="ad" placeholder="Adınızı giriniz">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="soyad" class="form-label">Soyadınız:</label>
                            <input type="text" class="form-control" id="soyad" placeholder="Soyadınızı giriniz">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz:</label>
                            <input type="email" class="form-control" id="email" placeholder="ornek@mail.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefon" class="form-label">Telefon Numaranız:</label>
                            <input type="tel" class="form-control" id="telefon" placeholder="05XX XXX XX XX">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="mesaj" class="form-label">Mesajınız:</label>
                        <textarea class="form-control" id="mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Gönder</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 p-3 text-muted">
        <small>&copy; 2026 Mehmet Zengince - Tüm Hakları Saklıdır.</small>
    </footer>

    <script>
        document.getElementById('iletisimFormu').addEventListener('submit', function(event) {
            // Formun kendi kendine sayfa yenilemesini durduruyoruz
            event.preventDefault();

            // Kutuların içindeki yazıları alıp kenarlarındaki boşlukları (trim) temizliyoruz
            const ad = document.getElementById('ad').value.trim();
            const soyad = document.getElementById('soyad').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const mesaj = document.getElementById('mesaj').value.trim();

            // Boşluk kontrolü yapıyoruz
            if (ad === "" || soyad === "" || email === "" || telefon === "" || mesaj === "") {
                alert("Lütfen tüm alanları eksiksiz doldurunuz!");
            } else {
                // Her şey doluysa senin istediğin başarı mesajını gösteriyoruz
                alert("Mesajınız iletildi, teşekkürler!");
                
                // Gönderdikten sonra formu sıfırlayıp temizliyoruz
                document.getElementById('iletisimFormu').reset();
            }
        });
    </script>
</body>
</html>
