            <a class="navbar-brand" href="index.html">MEHMET ZENGİNCE</a>
            <div class="collapse navbar-collapse d-flex justify-content-end">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkımda</a></li>

                        <button id="darkModeBtn" class="btn btn-outline-light btn-sm">🌙 Karanlık Mod</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <header class="text-center mb-5 border-bottom pb-3">
            <h1 class="display-4 text-primary">Bana Ulaşın</h1>
            <p class="lead">Görüş, öneri and mesajlarınız için aşağıdaki formu doldurabilirsiniz.</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <form action="iletisim.php" method="POST" id="iletisimForm">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="ad" class="form-label">Adınız:</label>
                            <input type="text" class="form-control" id="ad" name="ad" placeholder="Adınızı giriniz" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="soyad" class="form-label">Soyadınız:</label>
                            <input type="text" class="form-control" id="soyad" name="soyad" placeholder="Soyadınızı giriniz" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz:</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="ornek@mail.com" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefon" class="form-label">Telefon Numaranız:</label>
                            <input type="tel" class="form-control" id="telefon" name="telefon" placeholder="05XX XXX XX XX">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="mesaj" class="form-label">Mesajınız:</label>
                        <textarea class="form-control" id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazınız..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Gönder</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 p-3 text-muted">
        <small>&copy; 2026 Mehmet Zengince - Tüm Hakları Saklıdır.</small>
    </footer>

    <script src="main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validator/13.11.0/validator.min.js"></script>
    
    <script>
        document.getElementById('iletisimForm').addEventListener('submit', function(e) {
            const emailInput = document.getElementById('email').value;

            if (!validator.isEmail(emailInput)) {
                e.preventDefault(); 
                alert("Lütfen geçerli bir e-posta adresi giriniz! (Validator.js uyarısı)");
            }
        });
    </script>
</body>
</html>
